{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card">
            <h2 class="text-center mb-4">Join Bhutan Hyundai Motors</h2>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid gap-2 mt-4">
                    <button class="btn btn-primary" type="submit">Create Account</button>
                </div>
            </form>
            <div class="mt-4 text-center">
                <p class="text-muted">Already have an account? <a href="{% url 'login' %}" class="text-white">Login
                        here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
