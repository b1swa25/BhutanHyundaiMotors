{% extends "base.html" %}
{% load static %}

{% block title %}Page Not Found - Bhutan Hyundai Motors{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="glass-card mx-auto" style="max-width: 700px;">
        <div class="mb-4">
            <img src="{% static 'images/hyundai_logo_spinner.png' %}" alt="Hyundai Logo"
                style="width: 150px; height: auto; filter: drop-shadow(0 0 10px var(--accent-glow));">
        </div>

        <h1 class="display-1 accent-text mb-4" style="font-size: 8rem; font-weight: 700;">404</h1>
        <h2 class="mb-3" style="font-weight: 600;">Page Not Found</h2>
        <p class="mb-4 opacity-75" style="font-size: 1.1rem;">
            The page you're looking for doesn't exist or has been moved.
        </p>

        <div class="mt-4">
            <a href="{% url 'home' %}" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>Return to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
