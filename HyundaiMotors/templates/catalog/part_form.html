{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-card">
            <h2 class="mb-4">{% if object %}Edit{% else %}Add New{% endif %} Part</h2>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-4">
                    <button class="btn btn-primary" type="submit">Save Part</button>
                    <a href="{% url 'part_list' %}" class="btn btn-link text-white">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
